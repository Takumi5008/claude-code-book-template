<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理 - 起動中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 50%, #7c3aed 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      color: white;
      width: 320px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.3);
    }
    .logo {
      width: 68px; height: 68px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(129,140,248,0.5);
    }
    .logo svg { width: 36px; height: 36px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 36px; }
    .spinner-wrap { margin: 0 auto 24px; width: 48px; height: 48px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .detail { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 24px; }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
    .progress {
      background: rgba(255,255,255,0.15);
      border-radius: 100px;
      height: 5px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      border-radius: 100px;
      transition: width 0.8s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </div>
    <h1>シフト管理</h1>
    <p class="subtitle">シフト管理システム</p>
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <p class="status" id="status">サーバーを起動中<span class="dots"></span></p>
    <p class="detail" id="detail">しばらくお待ちください（最大60秒）</p>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
  </div>

  <script>
    const APP_URL = 'https://shift-app-4ikr.onrender.com';
    const status = document.getElementById('status');
    const detail = document.getElementById('detail');
    const bar = document.getElementById('bar');
    let attempt = 0;
    let progress = 0;

    const progressTimer = setInterval(() => {
      progress = Math.min(progress + 2, 90);
      bar.style.width = progress + '%';
    }, 1000);

    async function check() {
      attempt++;
      detail.textContent = '接続試行中... (' + attempt + '回目)';
      try {
        await fetch(APP_URL + '/api/health', { mode: 'no-cors', cache: 'no-store' });
        clearInterval(progressTimer);
        bar.style.width = '100%';
        status.innerHTML = '起動完了！';
        detail.textContent = 'アプリに移動します...';
        setTimeout(() => { window.location.replace(APP_URL); }, 600);
      } catch (e) {
        setTimeout(check, 3000);
      }
    }

    setTimeout(check, 500);
    setTimeout(() => { window.location.replace(APP_URL); }, 60000);
  </script>
</body>
</html>

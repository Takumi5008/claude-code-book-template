<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKR管理 - 起動中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e40af 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      color: white;
      width: 320px;
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #60a5fa, #818cf8);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px; font-weight: 900;
      box-shadow: 0 8px 24px rgba(96,165,250,0.4);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 32px; }
    .spinner-wrap { margin: 0 auto 24px; width: 48px; height: 48px; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .detail { font-size: 12px; color: rgba(255,255,255,0.5); }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
    .progress {
      margin-top: 24px;
      background: rgba(255,255,255,0.15);
      border-radius: 100px;
      height: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #60a5fa, #818cf8);
      border-radius: 100px;
      transition: width 1s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">H</div>
    <h1>HKR管理</h1>
    <p class="subtitle">Wi-Fi開通率管理システム</p>
    <div class="spinner-wrap"><div class="spinner"></div></div>
    <p class="status" id="status">サーバーを起動中<span class="dots"></span></p>
    <p class="detail" id="detail">しばらくお待ちください（最大30秒）</p>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
  </div>

  <script>
    const APP_URL = 'https://hkr-app.onrender.com';
    const status = document.getElementById('status');
    const detail = document.getElementById('detail');
    const bar = document.getElementById('bar');
    let attempt = 0;
    let progress = 0;

    const progressTimer = setInterval(() => {
      progress = Math.min(progress + 3, 90);
      bar.style.width = progress + '%';
    }, 1000);

    async function check() {
      attempt++;
      detail.textContent = '接続試行中... (' + attempt + '回目)';
      try {
        await fetch(APP_URL + '/login', { mode: 'no-cors', cache: 'no-store' });
        clearInterval(progressTimer);
        bar.style.width = '100%';
        status.innerHTML = '起動完了！';
        detail.textContent = 'アプリに移動します...';
        setTimeout(() => { window.location.replace(APP_URL); }, 500);
      } catch (e) {
        setTimeout(check, 3000);
      }
    }

    setTimeout(check, 500);

    // 最大45秒後に強制転送
    setTimeout(() => { window.location.replace(APP_URL); }, 45000);
  </script>
</body>
</html>

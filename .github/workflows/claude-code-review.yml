name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            このPRのコードをレビューしてください。以下の観点で確認し、日本語でコメントしてください：
            - バグや潜在的な問題
            - セキュリティ上の懸念
            - パフォーマンスの問題
            - コードの可読性・保守性
            改善が必要な点はPRコメントとして投稿してください。
